name: Main CI

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  master-main-gate:
    name: Master Main Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: aptitude
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aptitude"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/aptitude
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/aptitude

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run --extra dev ruff check .

      - name: Check formatting
        run: uv run --extra dev ruff format --check .

      - name: Typecheck
        run: uv run --extra dev mypy app

      - name: Run full test suite
        run: uv run --extra dev pytest -m "not integration"

      - name: Import app entrypoint
        run: uv run python -c "from app.main import app"

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Run integration tests
        run: uv run --extra dev pytest tests/integration

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-platform Docker image
        run: docker buildx build --platform linux/amd64,linux/arm64 --tag y0ncha/aptitude-server:latest .
