name: Dev CI

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dev-pr-gate:
    name: Dev PR Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: aptitude
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aptitude"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/aptitude
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/aptitude

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run --extra dev ruff check .

      - name: Check formatting
        run: uv run --extra dev ruff format --check .

      - name: Typecheck
        run: uv run --extra dev mypy app

      - name: Run tests
        run: uv run --extra dev pytest -m "not integration"

      - name: Import app entrypoint
        run: uv run python -c "from app.main import app"

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Run integration tests
        run: uv run --extra dev pytest tests/integration

      - name: Validate Prometheus config and rules
        run: |
          docker run --rm \
            -v "$PWD/ops/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.5.1 \
            promtool check config /etc/prometheus/prometheus.yml

      - name: Validate observability compose profile
        run: docker compose --profile observability config >/dev/null

      - name: Build app image for smoke test
        run: docker buildx build --load --platform linux/amd64 --tag y0ncha/aptitude-server:latest .

      - name: Container smoke test
        run: |
          docker compose --profile observability up -d db
          docker compose --profile observability run --rm migrate
          docker compose --profile observability up -d app prometheus grafana
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl --fail http://127.0.0.1:8000/healthz
          curl --fail http://127.0.0.1:8000/readyz
          curl --fail http://127.0.0.1:8000/metrics
          docker compose --profile observability down -v
