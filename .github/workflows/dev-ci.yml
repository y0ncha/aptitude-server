name: Dev CI

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dev-pr-gate:
    name: Dev PR Gate
    runs-on: ubuntu-latest

    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/aptitude
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/aptitude

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run --extra dev ruff check .

      - name: Check formatting
        run: uv run --extra dev ruff format --check .

      - name: Typecheck
        run: uv run --extra dev mypy app

      - name: Run tests
        run: uv run --extra dev pytest -m "not integration"

      - name: Import app entrypoint
        run: uv run python -c "from app.main import app"

      - name: Start compose database
        run: |
          docker compose up -d db
          for attempt in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U postgres -d aptitude >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker compose exec -T db pg_isready -U postgres -d aptitude

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Run integration tests
        run: uv run --extra dev pytest tests/integration

      - name: Validate Prometheus config and rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "$PWD/ops/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.5.1 \
            check config /etc/prometheus/prometheus.yml

      - name: Validate observability compose profile
        run: docker compose --profile observability config >/dev/null

      - name: Build app image for smoke test
        run: docker buildx build --load --platform linux/amd64 --tag y0ncha/aptitude-server:latest .

      - name: Container smoke test
        run: |
          APP_IMAGE=y0ncha/aptitude-server:latest docker compose --profile observability up -d db
          APP_IMAGE=y0ncha/aptitude-server:latest docker compose --profile observability run --rm migrate
          APP_IMAGE=y0ncha/aptitude-server:latest docker compose --profile observability up -d server observability
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:3100/ready >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for attempt in $(seq 1 30); do
            if curl --silent http://127.0.0.1:9090/api/v1/targets | grep -q '"job":"aptitude-server"' \
              && curl --silent http://127.0.0.1:9090/api/v1/targets | grep -q '"job":"loki"' \
              && curl --silent http://127.0.0.1:9090/api/v1/targets | grep -q '"job":"otelcol"'; then
              break
            fi
            sleep 1
          done
          curl --fail http://127.0.0.1:8000/healthz
          curl --fail http://127.0.0.1:8000/readyz
          curl --fail http://127.0.0.1:8000/metrics
          curl --fail http://127.0.0.1:3100/ready
          curl --silent http://127.0.0.1:9090/api/v1/targets | grep '"job":"aptitude-server"'
          curl --silent http://127.0.0.1:9090/api/v1/targets | grep '"job":"loki"'
          curl --silent http://127.0.0.1:9090/api/v1/targets | grep '"job":"otelcol"'
          curl --silent --fail -H 'X-Request-ID: loki-smoke' http://127.0.0.1:8000/healthz >/dev/null
          START=$(python3 -c 'import time; print(time.time_ns() - 300_000_000_000)')
          for attempt in $(seq 1 30); do
            END=$(python3 -c 'import time; print(time.time_ns())')
            if curl --silent --get --data-urlencode 'query={service_name="aptitude-server"} |= "loki-smoke"' --data-urlencode "start=${START}" --data-urlencode "end=${END}" --data-urlencode 'limit=20' http://127.0.0.1:3100/loki/api/v1/query_range | python3 -c 'import json, sys; data = json.load(sys.stdin); raise SystemExit(0 if any(stream["values"] for stream in data["data"]["result"]) else 1)'; then
              break
            fi
            sleep 1
          done
          END=$(python3 -c 'import time; print(time.time_ns())')
          curl --silent --get --data-urlencode 'query={service_name="aptitude-server"} |= "loki-smoke"' --data-urlencode "start=${START}" --data-urlencode "end=${END}" --data-urlencode 'limit=20' http://127.0.0.1:3100/loki/api/v1/query_range | python3 -c 'import json, sys; data = json.load(sys.stdin); matches = [(ts, line) for stream in data["data"]["result"] for ts, line in stream["values"]]; print(matches[0][1]) if matches else sys.exit("No Loki records matched loki-smoke")'

      - name: Tear down compose services
        if: always()
        run: docker compose --profile observability down -v
