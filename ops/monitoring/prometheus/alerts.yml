groups:
  - name: aptitude-server
    rules:
      - alert: AptitudeServerDatabaseNotReady
        expr: aptitude_readiness_status{dependency="database"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Aptitude Server database readiness is failing
          description: The readiness gauge reports the PostgreSQL dependency as not ready.

      - alert: AptitudeServerHighHttp5xxRate
        expr: |
          sum(rate(aptitude_http_requests_total{status_class="5xx",route!="__unmatched__"}[5m]))
          /
          clamp_min(sum(rate(aptitude_http_requests_total{route!="__unmatched__"}[5m])), 0.001)
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Aptitude Server is returning too many 5xx responses
          description: More than 5% of requests are failing with 5xx responses over the last 10 minutes.

      - alert: AptitudeServerDiscoveryP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(aptitude_registry_operation_duration_seconds_bucket{surface="discovery"}[5m])
            )
          ) > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Discovery latency is above the release target
          description: The p95 discovery latency has exceeded 250ms over the last 10 minutes.

      - alert: AptitudeServerPublishClientErrors
        expr: increase(aptitude_registry_operation_total{surface="publish",outcome="client_error"}[15m]) > 0
        for: 5m
        labels:
          severity: info
        annotations:
          summary: Publish requests are returning client errors
          description: Investigate publish failures caused by validation, auth, or policy denials.

      - alert: AptitudeServerLokiUnavailable
        expr: up{job="loki"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Loki is unavailable in the local observability stack
          description: Grafana log queries will fail until the Loki service is reachable again.

      - alert: AptitudeServerCollectorUnavailable
        expr: up{job="otelcol"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: The OpenTelemetry collector is unavailable in the local observability stack
          description: Application logs are no longer being shipped from the shared log volume into Loki.
