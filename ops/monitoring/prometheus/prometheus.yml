global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - ./alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: aptitude-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:8000

  - job_name: loki
    static_configs:
      - targets:
          - 127.0.0.1:3100

  - job_name: otelcol
    static_configs:
      - targets:
          - 127.0.0.1:8888
