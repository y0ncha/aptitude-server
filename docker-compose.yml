name: aptitude-local

services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:15.17}
    container_name: aptitude-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aptitude}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aptitude}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - aptitude-postgres-data:/var/lib/postgresql/data

  app:
    profiles: ["observability"]
    build:
      context: .
    image: ${APP_IMAGE:-y0ncha/aptitude-server:local}
    container_name: aptitude-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/aptitude
      AUTH_TOKENS_JSON: '{"reader-token":["read"],"publisher-token":["read","publish"],"admin-token":["read","publish","admin"]}'
      APP_ENV: container
      LOG_LEVEL: INFO
      PORT: 8000
      UVICORN_RELOAD: "false"
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz').read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  migrate:
    profiles: ["observability"]
    build:
      context: .
    image: ${APP_IMAGE:-y0ncha/aptitude-server:local}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/aptitude
      APP_ENV: container
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  prometheus:
    profiles: ["observability"]
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.5.1}
    container_name: aptitude-prometheus
    depends_on:
      app:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  grafana:
    profiles: ["observability"]
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:11.6.0}
    container_name: aptitude-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./ops/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  aptitude-postgres-data:
  prometheus-data:
  grafana-data:
