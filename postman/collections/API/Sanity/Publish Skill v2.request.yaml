$kind: http-request
order: 4000

method: POST
url: "{{baseUrl}}/skills/publish"

headers:
  - key: Accept
    value: application/json
    description: Expect the created immutable skill version metadata

body:
  type: formdata
  content:
    - type: text
      key: manifest
      value: "{{sanity_manifest}}"
      description: Collection-generated manifest for the second sanity publish
      disabled: false
    - type: file
      key: artifact
      src:
        - postman-cloud:///1f11c04f-6778-4170-bed0-59a0db4b13aa
      description: Local artifact fixture uploaded with the publish request
      disabled: false

scripts:
  - type: afterResponse
    code: >-
      let json = null;

      try {
        json = pm.response.json();
      } catch (error) {
        json = null;
      }


      pm.test('Status is 201', () => {
        pm.response.to.have.status(201);
      });


      pm.test('Publish v2 response matches the requested identity', () => {
        pm.expect(json).to.be.an('object');
        pm.expect(json.skill_id).to.eql(pm.collectionVariables.get('sanity_skill_id'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(json.manifest.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
      });


      if (pm.response.code === 201 && json) {
        pm.collectionVariables.set('published_skill_id', json.skill_id);
        pm.collectionVariables.set('published_version_latest', json.version);
      }


      pm.execution.setNextRequest(pm.response.code === 201 ? 'Fetch Published
      Skill' : null);
    language: text/javascript
