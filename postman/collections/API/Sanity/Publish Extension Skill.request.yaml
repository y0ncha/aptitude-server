$kind: http-request
order: 4000

method: POST
url: '{{baseUrl}}/skills/{{sanity_extension_slug}}/versions'

headers:
  - key: Accept
    value: application/json
    description: Expect the created immutable extension version metadata
  - key: Content-Type
    value: application/json
    description: Send the normalized JSON publish contract
  - key: Authorization
    value: 'Bearer {{publishToken}}'
    description: Authenticate with a caller that has the `publish` scope

body:
  type: json
  content: |-
    {
      "intent": "create_skill",
      "version": "{{sanity_version_1}}",
      "content": {
        "raw_markdown": "# Postman Extension Skill\n\nRun `{{runId}}` extension version 1.\n"
      },
      "metadata": {
        "name": "Postman Extension Skill",
        "description": "Extension seed for relationship coverage",
        "tags": ["postman", "sanity", "extension"],
        "headers": {
          "runtime": "python"
        },
        "inputs_schema": {
          "type": "object"
        },
        "outputs_schema": {
          "type": "object"
        },
        "token_estimate": 120,
        "maturity_score": 0.82,
        "security_score": 0.91
      },
      "relationships": {
        "depends_on": [],
        "extends": [],
        "conflicts_with": [],
        "overlaps_with": []
      }
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 201', () => {
        pm.response.to.have.status(201);
      });

      pm.test('Extension skill publish returns the created version', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_extension_slug'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_1'));
      });

      pm.execution.setNextRequest(pm.response.code === 201 ? 'Publish Overlap Skill' : null);
