$kind: http-request
order: 2000

method: GET
url: '{{baseUrl}}/readyz'

headers:
  - key: Accept
    value: application/json
    description: 'Request a JSON readiness response'

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Readyz payload reports database readiness', () => {
        const json = pm.response.json();
        pm.expect(json.status).to.eql('ready');
        pm.expect(json.checks).to.be.an('array').and.not.empty;
        pm.expect(
          json.checks.some((check) => check.name === 'database' && check.status === 'ok'),
        ).to.eql(true);
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'Publish Skill v1' : null);
