$kind: http-request
name: Publish Skill v1
order: 6000

method: POST
url: "{{baseUrl}}/skills/{{sanity_primary_slug}}/versions"

headers:
  - key: Accept
    value: application/json
    description: Expect the created immutable skill version metadata
  - key: Content-Type
    value: application/json
    description: Send the normalized JSON publish contract
  - key: Authorization
    value: bearer {{publishToken}}
    description: Authenticate with a caller that has the `publish` scope

body:
  type: json
  content: >-
    {
      "intent": "create_skill",
      "version": "{{sanity_version_1}}",
      "content": {
        "raw_markdown": "# Postman Primary Skill v1\n\nRun `{{runId}}` primary skill version 1.\n"
      },
      "metadata": {
        "name": "Postman Primary Skill",
        "description": "Primary sanity skill for collection coverage",
        "tags": ["postman", "sanity", "primary"],
        "headers": {
          "runtime": "python"
        },
        "inputs_schema": {
          "type": "object"
        },
        "outputs_schema": {
          "type": "object"
        },
        "token_estimate": 200,
        "maturity_score": 0.9,
        "security_score": 0.95
      },
      "governance": {
        "trust_tier": "internal",
        "provenance": {
          "repo_url": "https://github.com/example/skills",
          "commit_sha": "1111111111111111111111111111111111111111",
          "tree_path": "skills/postman-primary",
          "publisher_identity": "postman/manual-qa"
        }
      },
      "relationships": {
        "depends_on": [
          {
            "slug": "{{sanity_dependency_slug}}",
            "version": "{{sanity_version_1}}",
            "optional": false,
            "markers": ["linux"]
          }
        ],
        "extends": [
          {
            "slug": "{{sanity_extension_slug}}",
            "version": "{{sanity_version_1}}"
          }
        ],
        "conflicts_with": [
          {
            "slug": "postman.conflict.{{runId}}",
            "version": "9.9.9"
          }
        ],
        "overlaps_with": [
          {
            "slug": "{{sanity_overlap_slug}}",
            "version": "{{sanity_version_1}}"
          }
        ]
      }
    }

scripts:
  - type: afterResponse
    code: >-
      const json = pm.response.json();


      pm.test('Status is 201', () => {
        pm.response.to.have.status(201);
      });


      pm.test('Publish v1 response matches the requested identity', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_1'));
        pm.expect(json.version_checksum.algorithm).to.eql('sha256');
        pm.expect(json.content.checksum.algorithm).to.eql('sha256');
        pm.expect(json.lifecycle_status).to.eql('published');
        pm.expect(json.trust_tier).to.eql('internal');
        pm.expect(json.provenance.repo_url).to.eql('https://github.com/example/skills');
        pm.expect(json.provenance.publisher_identity).to.eql('postman/manual-qa');
        pm.expect(json.provenance.trust_context.trust_tier).to.eql('internal');
        pm.expect(json.published_at).to.be.a('string').and.not.empty;
        pm.expect(json).to.not.have.property('content_download_path');
        pm.expect(json).to.not.have.property('relationships');
      });


      pm.execution.setNextRequest(pm.response.code === 201 ? 'Publish Skill v2'
      : null);
    language: text/javascript
