$kind: http-request
order: 7500

method: PATCH
url: '{{baseUrl}}/skills/{{sanity_primary_slug}}/versions/{{sanity_version_2}}/status'

headers:
  - key: Accept
    value: application/json
    description: Expect the updated immutable lifecycle status payload
  - key: Content-Type
    value: application/json
    description: Send the immutable lifecycle transition request body
  - key: Authorization
    value: 'Bearer {{adminToken}}'
    description: Authenticate with a caller that has the `admin` scope

body:
  type: json
  content: |-
    {
      "status": "deprecated",
      "note": "Postman sanity lifecycle transition for authenticated admin coverage."
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Lifecycle update returns the current immutable status view', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(json.status).to.eql('deprecated');
        pm.expect(json.trust_tier).to.eql('untrusted');
        pm.expect(json.is_current_default).to.eql(false);
        pm.expect(json.lifecycle_changed_at).to.be.a('string').and.not.empty;
      });

      pm.execution.setNextRequest(
        pm.response.code === 200 ? 'Fetch Published Skill Metadata' : null,
      );
