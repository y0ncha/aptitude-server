$kind: http-request
order: 1500

method: GET
url: '{{baseUrl}}/metrics'

headers:
  - key: Accept
    value: text/plain
    description: Request Prometheus text exposition for operational metrics

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const body = pm.response.text();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Metrics exposes Prometheus payload', () => {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('text/plain');
        pm.expect(body).to.include('aptitude_http_requests_total');
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'Readyz' : null);
