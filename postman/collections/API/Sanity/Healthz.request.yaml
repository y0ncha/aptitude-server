$kind: http-request
order: 1000

method: GET
url: '{{baseUrl}}/healthz'

headers:
  - key: Accept
    value: application/json
    description: Request a JSON liveness response

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Healthz payload matches contract', () => {
        const json = pm.response.json();
        pm.expect(json.status).to.eql('ok');
        pm.expect(json.service).to.be.a('string').and.not.empty;
        pm.expect(json.environment).to.be.a('string').and.not.empty;
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'Metrics' : null);
