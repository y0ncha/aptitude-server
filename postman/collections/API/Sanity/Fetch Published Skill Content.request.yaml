$kind: http-request
order: 9000

method: GET
url: '{{baseUrl}}/skills/{{sanity_primary_slug}}/versions/{{sanity_version_2}}/content'

headers:
  - key: Accept
    value: text/markdown
    description: Request immutable markdown content for one exact coordinate
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const body = pm.response.text();
      const runId = pm.collectionVariables.get('runId');
      const expected = `# Postman Primary Skill v2\n\nRun \`${runId}\` primary skill version 2 with a larger body for discovery and content checks.\n`;

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Exact content fetch returns immutable markdown with cache headers', () => {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('text/markdown; charset=utf-8');
        pm.expect(pm.response.headers.get('Cache-Control')).to.eql('public, immutable');
        pm.expect(pm.response.headers.get('ETag')).to.eql(
          pm.collectionVariables.get('sanity_primary_content_digest'),
        );
        pm.expect(pm.response.headers.get('Content-Length')).to.eql(String(expected.length));
        pm.expect(body).to.eql(expected);
      });

      pm.execution.setNextRequest(
        pm.response.code === 200 ? 'Discover Published Skill Candidates' : null,
      );
