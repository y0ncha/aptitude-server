$kind: http-request
name: Publish Dependency Skill
auth:
  type: bearer
  credentials:
    token: publisher-token
order: 3000

method: POST
url: "{{baseUrl}}/skills/{{sanity_dependency_slug}}/versions"

headers:
  - key: Accept
    value: application/json
    description: Expect the created immutable dependency version metadata
  - key: Content-Type
    value: application/json
    description: Send the normalized JSON publish contract
  - key: Authorization
    value: Bearer {{publishToken}}
    description: Authenticate with a caller that has the `publish` scope

body:
  type: json
  content: >-
    {
      "intent": "create_skill",
      "version": "{{sanity_version_1}}",
      "content": {
        "raw_markdown": "# Postman Dependency Skill\n\nRun `{{runId}}` dependency version 1.\n"
      },
      "metadata": {
        "name": "Postman Dependency Skill",
        "description": "Dependency seed for relationship coverage",
        "tags": ["postman", "sanity", "dependency"],
        "headers": {
          "runtime": "python"
        },
        "inputs_schema": {
          "type": "object"
        },
        "outputs_schema": {
          "type": "object"
        },
        "token_estimate": 110,
        "maturity_score": 0.8,
        "security_score": 0.9
      },
      "relationships": {
        "depends_on": [],
        "extends": [],
        "conflicts_with": [],
        "overlaps_with": []
      }
    }

scripts:
  - type: afterResponse
    code: >-
      const json = pm.response.json();


      pm.test('Status is 201', () => {
        pm.response.to.have.status(201);
      });


      pm.test('Dependency skill publish returns the created version', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_dependency_slug'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_1'));
      });


      pm.execution.setNextRequest(pm.response.code === 201 ? 'Publish Extension
      Skill' : null);
    language: text/javascript
