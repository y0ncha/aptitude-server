# ============================================================
# Aptitude Skills API — Collection Definition
# ============================================================

$kind: collection

name: API
description: >-
  Collection for validating the current Aptitude Skills API.

    - Sanity: covers authenticated publish, lifecycle updates, exact fetch, discovery, and resolution
    - Negative: covers authenticated validation, duplicate, exact-fetch errors, and resolution errors

  Note: `/readyz` exposes a 503 branch only when the runtime is unhealthy, so
  the collection

  asserts the healthy `200 ready` path by default.


  All business endpoints require `Authorization: Bearer <token>`. The default
  token variables

  match the local development `AUTH_TOKENS_JSON` example from the README.

variables:
  baseUrl: http://localhost:8000
  readToken: reader-token
  publishToken: publisher-token
  adminToken: admin-token
  runId: ""
  sanity_version_1: 1.0.0
  sanity_version_2: 2.0.0
  sanity_dependency_slug: ""
  sanity_extension_slug: ""
  sanity_overlap_slug: ""
  sanity_primary_slug: ""
  negative_invalid_slug: ""
  negative_duplicate_slug: ""
  negative_missing_slug: ""
  negative_missing_version: 9.9.9
  invalid_slug: invalid slug
  invalid_version: not-a-semver
  sanity_primary_content_digest: ""

scripts:
  - type: http:beforeRequest
    code: >-
      const requestName = pm.info.requestName || '';

      const resetFlowStarts = new Set(['Healthz', 'Publish Invalid Request']);


      const ensureRunState = (forceReset = false) => {
        let runId = pm.collectionVariables.get('runId');

        if (forceReset || !runId) {
          runId = `${Date.now()}-${Math.floor(Math.random() * 100000)}`;
          pm.collectionVariables.set('runId', runId);
          pm.collectionVariables.set('sanity_dependency_slug', `postman.dep.${runId}`);
          pm.collectionVariables.set('sanity_extension_slug', `postman.ext.${runId}`);
          pm.collectionVariables.set('sanity_overlap_slug', `postman.overlap.${runId}`);
          pm.collectionVariables.set('sanity_primary_slug', `postman.primary.${runId}`);
          pm.collectionVariables.set('negative_invalid_slug', `postman.invalid.${runId}`);
          pm.collectionVariables.set('negative_duplicate_slug', `postman.duplicate.${runId}`);
          pm.collectionVariables.set('negative_missing_slug', `postman.missing.${runId}`);
        }
      };


      ensureRunState(resetFlowStarts.has(requestName));
    language: text/javascript
