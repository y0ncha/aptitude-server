$kind: http-request
order: 5000

method: GET
url: '{{baseUrl}}/skills/{{negative_missing_slug}}/versions/{{negative_missing_version}}/content'

headers:
  - key: Accept
    value: text/markdown
    description: Expect a normalized not-found response for an unknown exact content coordinate
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 404', () => {
        pm.response.to.have.status(404);
      });

      pm.test('Unknown exact content coordinate returns the normalized API error envelope', () => {
        pm.expect(json.error.code).to.eql('SKILL_VERSION_NOT_FOUND');
        pm.expect(json.error.details.slug).to.eql(pm.collectionVariables.get('negative_missing_slug'));
        pm.expect(json.error.details.version).to.eql(
          pm.collectionVariables.get('negative_missing_version'),
        );
      });

      pm.execution.setNextRequest(pm.response.code === 404 ? 'Discover Without Name' : null);
