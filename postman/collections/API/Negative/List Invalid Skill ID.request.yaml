$kind: http-request
order: 4000

method: GET
url: '{{baseUrl}}/skills/{{invalid_skill_id}}'

headers:
  - key: Accept
    value: application/json
    description: 'Expect FastAPI path validation to reject the invalid skill id'

pathVariables:
  - key: invalid_skill_id
    value: '{{invalid_skill_id}}'
    description: 'Invalid skill identifier containing spaces'

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Invalid skill id list returns FastAPI validation detail', () => {
        const json = pm.response.json();
        pm.expect(json.detail).to.be.an('array').and.not.empty;
        pm.expect(
          json.detail.some(
            (item) =>
              Array.isArray(item.loc) &&
              item.loc.includes('path') &&
              item.loc.includes('skill_id'),
          ),
        ).to.eql(true);
      });
