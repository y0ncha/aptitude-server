$kind: http-request
order: 2000

method: POST
url: '{{baseUrl}}/skills/{{negative_duplicate_slug}}/versions'

headers:
  - key: Accept
    value: application/json
    description: Expect a normalized duplicate-version response
  - key: Content-Type
    value: application/json
    description: Send the same normalized JSON publish contract again
  - key: Authorization
    value: 'Bearer {{publishToken}}'
    description: Authenticate with a caller that has the `publish` scope

body:
  type: json
  content: |-
    {
      "intent": "publish_version",
      "version": "1.0.0",
      "content": {
        "raw_markdown": "# Duplicate Seed Skill\n\nInitial version used to provoke a duplicate publish.\n",
        "rendered_summary": "Duplicate seed skill."
      },
      "metadata": {
        "name": "Duplicate Seed Skill",
        "description": "Seed version for duplicate publish coverage",
        "tags": ["postman", "negative", "duplicate"],
        "headers": {
          "runtime": "python"
        },
        "inputs_schema": {
          "type": "object"
        },
        "outputs_schema": {
          "type": "object"
        },
        "token_estimate": 75,
        "maturity_score": 0.7,
        "security_score": 0.8
      },
      "relationships": {
        "depends_on": [],
        "extends": [],
        "conflicts_with": [],
        "overlaps_with": []
      }
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 409', () => {
        pm.response.to.have.status(409);
      });

      pm.test('Duplicate publish returns the normalized API error envelope', () => {
        pm.expect(json.error.code).to.eql('DUPLICATE_SKILL_VERSION');
        pm.expect(json.error.details.slug).to.eql(
          pm.collectionVariables.get('negative_duplicate_slug'),
        );
        pm.expect(json.error.details.version).to.eql('1.0.0');
      });

      pm.execution.setNextRequest(
        pm.response.code === 409 ? 'Fetch Missing Skill Metadata' : null,
      );
