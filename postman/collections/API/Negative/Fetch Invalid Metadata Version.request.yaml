$kind: http-request
order: 4000

method: GET
url: '{{baseUrl}}/skills/{{negative_missing_slug}}/versions/{{invalid_version}}'

headers:
  - key: Accept
    value: application/json
    description: Expect request validation to reject the invalid semantic version in the path
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Invalid exact metadata version returns the normalized validation envelope', () => {
        pm.expect(json.error.code).to.eql('INVALID_REQUEST');
        pm.expect(
          json.error.details.errors.some(
            (item) =>
              Array.isArray(item.loc) &&
              item.loc.includes('path') &&
              item.loc.includes('version'),
          ),
        ).to.eql(true);
      });

      pm.execution.setNextRequest(
        pm.response.code === 422 ? 'Fetch Missing Skill Content' : null,
      );
