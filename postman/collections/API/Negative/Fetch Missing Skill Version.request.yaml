$kind: http-request
order: 2000

method: GET
url: '{{baseUrl}}/skills/{{negative_missing_skill_id}}/{{negative_missing_version}}'

headers:
  - key: Accept
    value: application/json
    description: 'Expect a normalized not-found error response'

pathVariables:
  - key: negative_missing_skill_id
    value: '{{negative_missing_skill_id}}'
    description: 'Valid but unknown skill identifier'
  - key: negative_missing_version
    value: '{{negative_missing_version}}'
    description: 'Valid but unknown version'

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 404', () => {
        pm.response.to.have.status(404);
      });

      pm.test('Missing version fetch returns the normalized API error envelope', () => {
        const json = pm.response.json();
        pm.expect(json.error.code).to.eql('SKILL_VERSION_NOT_FOUND');
        pm.expect(json.error.details.skill_id).to.eql(
          pm.collectionVariables.get('negative_missing_skill_id'),
        );
        pm.expect(json.error.details.version).to.eql(
          pm.collectionVariables.get('negative_missing_version'),
        );
      });
