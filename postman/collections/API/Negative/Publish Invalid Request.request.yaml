$kind: http-request
order: 1000

method: POST
url: '{{baseUrl}}/skills/{{negative_invalid_slug}}/versions'

headers:
  - key: Accept
    value: application/json
    description: Expect a normalized invalid-request response
  - key: Content-Type
    value: application/json
    description: Send an invalid normalized JSON publish contract
  - key: Authorization
    value: 'Bearer {{publishToken}}'
    description: Authenticate with a caller that has the `publish` scope

body:
  type: json
  content: |-
    {
      "intent": "create_skill",
      "version": "1.0.0",
      "content": {
        "raw_markdown": "# Invalid Postman Skill\n\nThis publish request should fail validation.\n",
        "rendered_summary": "Invalid request payload."
      },
      "metadata": {
        "name": "Invalid Postman Skill",
        "description": "Invalid publish payload for negative coverage",
        "tags": ["postman", "negative"],
        "headers": {
          "runtime": "python"
        },
        "inputs_schema": {
          "type": "object"
        },
        "outputs_schema": {
          "type": "object"
        },
        "token_estimate": 50,
        "maturity_score": 0.5,
        "security_score": 0.5
      },
      "relationships": {
        "depends_on": [
          {
            "slug": "{{sanity_dependency_slug}}",
            "version_constraint": "latest"
          }
        ],
        "extends": [],
        "conflicts_with": [],
        "overlaps_with": []
      }
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Invalid publish returns the normalized API error envelope', () => {
        pm.expect(json.error.code).to.eql('INVALID_REQUEST');
        pm.expect(json.error.details.errors).to.be.an('array').and.not.empty;
      });

      pm.execution.setNextRequest(pm.response.code === 422 ? 'Seed Duplicate Skill Version' : null);
