$kind: http-request
order: 1500

method: POST
url: '{{baseUrl}}/skills/{{negative_duplicate_slug}}/versions'

headers:
  - key: Accept
    value: application/json
    description: Seed a version for the duplicate-publish check
  - key: Content-Type
    value: application/json
    description: Send the normalized JSON publish contract
  - key: Authorization
    value: 'Bearer {{publishToken}}'
    description: Authenticate with a caller that has the `publish` scope

body:
  type: json
  content: |-
    {
      "intent": "create_skill",
      "version": "1.0.0",
      "content": {
        "raw_markdown": "# Duplicate Seed Skill\n\nInitial version used to provoke a duplicate publish.\n"
      },
      "metadata": {
        "name": "Duplicate Seed Skill",
        "description": "Seed version for duplicate publish coverage",
        "tags": ["postman", "negative", "duplicate"],
        "headers": {
          "runtime": "python"
        },
        "inputs_schema": {
          "type": "object"
        },
        "outputs_schema": {
          "type": "object"
        },
        "token_estimate": 75,
        "maturity_score": 0.7,
        "security_score": 0.8
      },
      "relationships": {
        "depends_on": [],
        "extends": [],
        "conflicts_with": [],
        "overlaps_with": []
      }
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 201', () => {
        pm.response.to.have.status(201);
      });

      pm.test('Duplicate seed version is created successfully', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('negative_duplicate_slug'));
        pm.expect(json.version).to.eql('1.0.0');
      });

      pm.execution.setNextRequest(
        pm.response.code === 201 ? 'Publish Duplicate Skill Version' : null,
      );
