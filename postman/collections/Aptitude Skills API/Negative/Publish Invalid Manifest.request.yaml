$kind: http-request
order: 1000

method: POST
url: '{{baseUrl}}/skills/publish'

headers:
  - key: Accept
    value: application/json
    description: 'Expect a normalized invalid-manifest error response'

body:
  type: formdata
  content:
    - key: manifest
      type: text
      value: '{{negative_invalid_manifest}}'
      description: 'Collection-generated invalid manifest payload'
    - key: artifact
      type: file
      src: '{{artifactFilePath}}'
      description: 'Local artifact fixture uploaded alongside the invalid manifest'

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Publish invalid manifest returns the normalized API error envelope', () => {
        const json = pm.response.json();
        pm.expect(json.error.code).to.eql('INVALID_MANIFEST');
        pm.expect(json.error.details.errors).to.be.an('array').and.not.empty;
      });
