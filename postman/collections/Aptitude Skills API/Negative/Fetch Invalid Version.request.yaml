$kind: http-request
order: 3000

method: GET
url: '{{baseUrl}}/skills/{{negative_missing_skill_id}}/{{invalid_version}}'

headers:
  - key: Accept
    value: application/json
    description: 'Expect FastAPI path validation to reject the invalid version'

pathVariables:
  - key: negative_missing_skill_id
    value: '{{negative_missing_skill_id}}'
    description: 'Valid skill identifier so only the version fails validation'
  - key: invalid_version
    value: '{{invalid_version}}'
    description: 'Invalid semantic version string'

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Invalid version fetch returns FastAPI validation detail', () => {
        const json = pm.response.json();
        pm.expect(json.detail).to.be.an('array').and.not.empty;
        pm.expect(
          json.detail.some(
            (item) =>
              Array.isArray(item.loc) &&
              item.loc.includes('path') &&
              item.loc.includes('version'),
          ),
        ).to.eql(true);
      });
