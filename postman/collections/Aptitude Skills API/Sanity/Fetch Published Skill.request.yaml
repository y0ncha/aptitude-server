$kind: http-request
order: 5000

method: GET
url: '{{baseUrl}}/skills/{{sanity_skill_id}}/{{sanity_version_2}}'

headers:
  - key: Accept
    value: application/json
    description: 'Request the stored skill version metadata and artifact'

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      let json = null;
      try {
        json = pm.response.json();
      } catch (error) {
        json = null;
      }

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Fetch response matches the published version', () => {
        pm.expect(json).to.be.an('object');
        pm.expect(json.skill_id).to.eql(pm.collectionVariables.get('sanity_skill_id'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(json.manifest.skill_id).to.eql(pm.collectionVariables.get('sanity_skill_id'));
        pm.expect(json.artifact_base64).to.be.a('string').and.not.empty;
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'List Published Skill Versions' : null);
